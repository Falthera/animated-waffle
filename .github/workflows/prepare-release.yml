name: Prepare Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message, 'chore(release): bump version')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read current version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          current_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          IFS='.' read -r major minor patch <<< "$current_version"
          next_version="${major}.${minor}.$((patch + 1))"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${current_version}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${{ steps.version.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists; skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "$tag_name" -m "Release ${tag_name#v}"
            git push origin "$tag_name"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifacts
        run: ./gradlew clean build verify sourcesJar --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: |
            build/libs/*-sources.jar
            build/libs/*.jar

      - name: Bump next development version
        shell: bash
        run: |
          set -euo pipefail
          next_version="${{ steps.version.outputs.next_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^mod_version=.*/mod_version=${next_version}/" gradle.properties
          git add gradle.properties
          git commit -m "chore(release): bump version to ${next_version} [skip ci]" || exit 0
          git push origin HEAD:main
