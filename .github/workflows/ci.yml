name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify
        run: ./gradlew build verify --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pvp-optimizer-artifacts
          path: |
            build/libs/*.jar
            build/reports/**
            build/test-results/**
